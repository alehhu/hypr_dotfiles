source = ~/.config/hypr/colors.conf

debug {
    disable_logs = false
}

monitor = , preferred, auto, 1

$mod = SUPER

exec-once = ~/.config/scripts/theme.sh
exec-once = swaync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mpd-mpris
exec-once = kdeconnect-indicator

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = $color1
    col.inactive_border = $color0
    layout = dwindle
    }

decoration {
    rounding = 16
    
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    dim_inactive = true
    dim_strength = 0.04
    
    shadow {
        enabled = true
        range = 35
        render_power = 4
        color = rgba(00000050)
        offset = 0 8
    }
    
    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.006
        brightness = 1.03
        contrast = 1.02
        vibrancy = 0.25
        vibrancy_darkness = 0.6
        new_optimizations = true
        xray = false
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 3, bounce, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = windowsMove, 1, 3, buttery, slide

    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 3, smooth
    animation = fadeShadow, 1, 3, smooth

    animation = workspaces, 1, 3.5, buttery, slidefade 20%    
    animation = specialWorkspace, 1, 3.5, buttery, slidefadevert -15%

    animation = border, 1, 5, smooth
    animation = borderangle, 1, 30, linear, loop

    animation = layersIn, 1, 3, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

input {
    kb_layout = it
    follow_mouse = 1
    kb_options = caps:escape
    touchpad {
        natural_scroll = false
    }
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
}

bind = $mod, Return, exec, kitty
bind = $mod SHIFT, RETURN, exec, [float; size 700 400] kitty
bind = $mod, space, exec, rofi -show drun
bind = $mod, E, exec, thunar
bind = $mod SHIFT, E, exec, kitty --class yazi -e yazi
bind = $mod, Q, killactive
bind = $mod, comma, exec, kitty --class editor -e vim ~/.config/hypr/hyprland.conf
bind = $mod CTRL, space, exec, rofimoji --action copy
bind = $mod SHIFT, space, togglefloating
bind = $mod, W, exec, ~/.config/scripts/theme.sh
bind = $mod, B, exec, kitty --class btop -e btop
bind = $mod, C, exec, kitty --class cava -e cava
bind = $mod, N, exec, swaync-client -t -sw
bind = $mod SHIFT, N, exec, swaync-client -C
bind = $mod, Backspace, exec, wlogout
bind = $mod, H, exec, ~/.config/scripts/keybinds.sh
bind = $mod, A, exec, ~/.config/scripts/actions.sh
bind = $mod, M, exec, rofi -show window
bind = $mod, X, exec, hyprlock
bind = $mod, F, fullscreen

bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

binde = $mod CTRL, Left, resizeactive, -20 0
binde = $mod CTRL, Right, resizeactive, 20 0
binde = $mod CTRL, Up, resizeactive, 0 -20
binde = $mod CTRL, Down, resizeactive, 0 20

bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, S, togglespecialworkspace
bind = $mod SHIFT, S, movetoworkspace, special

bind = $mod, P, pseudo
bind = $mod, J, togglesplit

bind = $mod CTRL, L, exec, hyprlock
bind = $mod SHIFT, C, centerwindow
bind = $mod CTRL, Return, exec, [float; size 900 600; center] kitty --class scratchterm

# --- macOS Style Screenshot Binds ---
# Cmd+Shift+3 (Full Screen)
bind = $mod SHIFT, 3, exec, sh -c 'mkdir -p ~/screenshots && grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Full Screenshot Saved"'
# Cmd+Shift+4 (Area Selection)
bind = $mod SHIFT, 4, exec, sh -c 'mkdir -p ~/screenshots && grim -g "$(slurp)" ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Selection Saved"'

# --- Mission Control (Workspace Overview) ---
# Similar to macOS Swipe Up / Ctrl+Up
bind = $mod, Up, workspace, e-1
bind = $mod, Down, workspace, e+1
# Better Tab Switcher (macOS Cmd+Tab)
bind = $mod, Tab, exec, rofi -show window -config ~/.config/rofi/config.rasi

# --- Quick Look / Focus Effect ---
# Instantly centers and floats any window (macOS vibe)
bind = $mod, I, togglefloating
bind = $mod, I, centerwindow
bind = $mod, I, resizeactive, exact 1000 650

# Keep old binds for compatibility
bind = , Print, exec, sh -c 'mkdir -p ~/screenshots && grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"'
bind = SHIFT, Print, exec, sh -c 'mkdir -p ~/screenshots && grim -g "$(slurp)" ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"'

bind = , Menu, exec, ~/.config/scripts/define.sh

bind = $mod, R, exec, sh -c 'mkdir -p ~/screen-recordings ~/.cache && gpu-screen-recorder -w screen -f 30 -a default_output -o ~/screen-recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & echo $! > ~/.cache/gpu-screen-recorder.pid; notify-send "Recording Started"'

bind = $mod SHIFT, R, exec, sh -c 'if [ -f ~/.cache/gpu-screen-recorder.pid ]; then kill -SIGINT "$(cat ~/.cache/gpu-screen-recorder.pid)" && rm -f ~/.cache/gpu-screen-recorder.pid && notify-send "Recording Stopped"; else notify-send "No active recording"; fi'


bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = , F1, exec, amixer set Master toggle
binde = , F2, exec, amixer set Master 1%-
binde = , F3, exec, amixer set Master 1%+
binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 1%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 1%+

binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%

windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0

windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

windowrule = match:float yes, center on

windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on

windowrule = match:class yazi, float on
windowrule = match:class yazi, size 70% 60%
windowrule = match:class yazi, center on

windowrule = match:class btop, float on
windowrule = match:class btop, size 70% 60%
windowrule = match:class btop, center on

windowrule = match:class cava, float on
windowrule = match:class cava, size 70% 30%
windowrule = match:class cava, center on

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell

layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi

layerrule = blur on, match:namespace gtk-layer-shell
layerrule = ignore_alpha 0, match:namespace gtk-layer-shell
