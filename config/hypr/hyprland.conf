source = ~/.config/hypr/colors.conf

debug {
    disable_logs = false
}

monitor = , preferred, auto, 1

$mod = SUPER

exec-once = ~/.config/scripts/theme.sh
exec-once = swaync
exec-once = gammastep -O 4500 &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mpd-mpris
exec-once = kdeconnect-indicator

# --- Clipboard Manager ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Window Swallower ---
exec-once = ~/.config/scripts/swallow.sh

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = $color1
    col.inactive_border = $color0
    layout = dwindle
    }

decoration {
    rounding = 16
    
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    dim_inactive = true
    dim_strength = 0.04
    
    shadow {
        enabled = true
        range = 35
        render_power = 4
        color = rgba(00000050)
        offset = 0 8
    }
    
    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.006
        brightness = 1.03
        contrast = 1.02
        vibrancy = 0.25
        vibrancy_darkness = 0.6
        new_optimizations = true
        xray = false
        popups = true
        special = true
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 3, bounce, slide
    animation = windowsOut, 1, 3, smooth, slide
    animation = windowsMove, 1, 3, buttery, slide

    animation = fadeIn, 1, 3, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 3, smooth
    animation = fadeShadow, 1, 3, smooth

    animation = workspaces, 1, 3.5, buttery, slidefade 20%    
    animation = specialWorkspace, 1, 3.5, buttery, slidefadevert -15%

    animation = border, 1, 5, smooth
    animation = borderangle, 1, 30, linear, loop

    animation = layersIn, 1, 3, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

input {
    kb_layout = it
    follow_mouse = 1
    kb_options = caps:escape
    touchpad {
        natural_scroll = false
    }
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
}

bind = $mod, T, exec, kitty
bind = $mod SHIFT, T, exec, [float; size 700 400] kitty
bind = $mod, A, exec, rofi -show drun
bind = $mod, space, exec, ~/.config/scripts/spotlight.py
bind = $mod, E, exec, thunar
bind = $mod SHIFT, E, exec, kitty --class yazi -e yazi
bind = $mod, V, togglefloating
bind = $mod, Y, exec, ~/.config/scripts/clipboard.sh
bind = $mod, Z, pin
bind = $mod, Q, killactive
bind = $mod, comma, exec, kitty --class editor -e vim ~/.config/hypr/hyprland.conf
bind = $mod CTRL, space, exec, rofimoji --action copy
bind = $mod SHIFT, space, togglefloating
bind = $mod, W, exec, ~/.config/scripts/theme.sh
bind = $mod SHIFT, W, exec, ~/.config/scripts/wallpaper-picker.sh
bind = $mod, B, exec, kitty --class btop -e btop
bind = $mod, C, exec, kitty --class cava -e cava
bind = $mod, N, exec, swaync-client -t -sw
bind = $mod SHIFT, N, exec, swaync-client -C
bind = $mod, Backspace, exec, pkill wlogout || wlogout -l /home/ale/.config/wlogout/layout -C /home/ale/.config/wlogout/style.css
bind = CTRL ALT, Delete, exec, pkill wlogout || wlogout -l /home/ale/.config/wlogout/layout -C /home/ale/.config/wlogout/style.css
bind = $mod, H, exec, ~/.config/scripts/keybinds.sh
bind = $mod, A, exec, ~/.config/scripts/actions.sh
bind = $mod SHIFT, A, exec, [float; size 700 650; center] kitty --class manual -e ~/.config/scripts/manual.sh
bind = $mod, M, exec, rofi -show window
bind = $mod, X, exec, hyprlock
bind = $mod, F, fullscreen

bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

binde = $mod CTRL, Left, resizeactive, -20 0
binde = $mod CTRL, Right, resizeactive, 20 0
binde = $mod CTRL, Up, resizeactive, 0 -20
binde = $mod CTRL, Down, resizeactive, 0 20

bind = $mod, Tab, cyclenext
bind = $mod SHIFT, Tab, cyclenext, prev

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# --- Magic Scratchpad ---
bind = $mod, S, togglespecialworkspace, scratch
bind = $mod SHIFT, S, movetoworkspace, special:scratch

# --- Search & AI ---
bind = $mod, K, exec, ~/.config/scripts/ai-ask.sh
bind = $mod ALT, space, exec, ~/.config/scripts/spotlight.py --refresh && notify-send "Spotlight" "Cache refreshed successfully"
# bind = $mod SHIFT, Space, exec, ~/.config/scripts/file-browser.sh

# --- Night Shift ---
bind = $mod, G, exec, pkill gammastep || gammastep -O 4000 & notify-send "Night Shift" "Warm colors active"

bind = $mod, P, pseudo
bind = $mod, J, togglesplit

bind = $mod CTRL, L, exec, hyprlock
bind = $mod SHIFT, C, centerwindow
bind = $mod CTRL, Return, exec, [float; size 900 600; center] kitty --class scratchterm

# --- Enhanced Screenshot Binds ---
# F9: Full screen with annotation tool
bind = , F9, exec, ~/.config/scripts/screenshot.sh full
# Shift+F9: Area selection with annotation
bind = SHIFT, F9, exec, ~/.config/scripts/screenshot.sh area
# $mod+Shift+O: OCR text extraction
bind = $mod SHIFT, O, exec, ~/.config/scripts/screenshot.sh ocr

# --- Workspaces (macOS style) ---
bind = CTRL, Left, workspace, e-1
bind = CTRL, Right, workspace, e+1
bind = CTRL, Up, workspace, e-1
bind = CTRL, Down, workspace, e+1

# --- Hyprexpo Workspace Overview (Mission Control) ---
# Uncomment after installing hyprexpo plugin:
# bind = $mod, grave, hyprexpo:expo, toggle

# --- Mission Control (Workspace Overview) ---
# Better Tab Switcher (macOS Cmd+Tab)
bind = $mod, Tab, exec, rofi -show window -config ~/.config/rofi/config.rasi

# --- Quick Look / Focus Effect ---
# Instantly centers and floats any window (macOS vibe)
bind = $mod, I, togglefloating
bind = $mod, I, centerwindow
bind = $mod, I, resizeactive, exact 1000 650

# Keep old binds for compatibility
bind = , Print, exec, ~/.config/scripts/screenshot.sh full
bind = SHIFT, Print, exec, ~/.config/scripts/screenshot.sh area

# --- Color Picker with History ---
bind = $mod SHIFT, P, exec, ~/.config/scripts/color-picker.sh
bind = $mod CTRL, P, exec, ~/.config/scripts/color-picker.sh --history

bind = , Menu, exec, ~/.config/scripts/define.sh

bind = $mod, R, exec, ~/.config/scripts/record.sh
bind = $mod SHIFT, R, exec, ~/.config/scripts/record.sh --area


bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = , F2, exec, systemctl suspend
binde = , F3, exec, brightnessctl set 5%-
binde = , F4, exec, brightnessctl set +5%
binde = , F5, exec, amixer set Master toggle
binde = , F6, exec, amixer set Master 1%-
binde = , F7, exec, amixer set Master 1%+

binde = , XF86AudioMute, exec, amixer set Master toggle
binde = , XF86AudioLowerVolume, exec, amixer set Master 1%-
binde = , XF86AudioRaiseVolume, exec, amixer set Master 1%+

binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%

windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0

windowrule = match:class weather_float, float on
windowrule = match:class weather_float, size 1200 850
windowrule = match:class weather_float, center on

windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

windowrule = match:float yes, center on

windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on

windowrule = match:class yazi, float on
windowrule = match:class yazi, size 70% 60%
windowrule = match:class yazi, center on

windowrule = match:class btop, float on
windowrule = match:class btop, size 70% 60%
windowrule = match:class btop, center on

windowrule = match:class cava, float on
windowrule = match:class cava, size 70% 30%
windowrule = match:class cava, center on

layerrule = ignore_alpha 0, match:namespace waybar

