source = ~/.config/hypr/colors.conf

background {
    monitor =
    path = $wallpaper
    color = $background
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_space = 0.15
    dots_center = true
    outer_color = $color1
    inner_color = $background
    font_color = $foreground
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +'%H:%M')</span>"
    color = $foreground
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = Benvenuto, $USER
    color = $foreground
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}
